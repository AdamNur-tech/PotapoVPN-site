<!DOCTYPE html>
<html>
<head>
    <title>PotapoVPN</title>
    <meta charset="UTF-8">
    <style>
body {
    margin: 0;
    background: linear-gradient(135deg, #0f172a, #1e3a8a, #312e81);
    font-family: Arial, sans-serif;
    color: white;
}

/* ОБЩИЙ КОНТЕЙНЕР */
.container {
    width: 100%;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* КАРТОЧКА */
.box {
    width: 100%;
    max-width: 420px;
    height: 100vh; /* ВО ВЕСЬ ЭКРАН */
    
    background: rgba(15, 23, 42, 0.95);
    backdrop-filter: blur(10px);

    display: flex;
    flex-direction: column;
    justify-content: center;

    padding: 20px;
    box-sizing: border-box;
}

/* ЗАГОЛОВОК */
h1 {
    text-align: center;
}

/* ТЕКСТ */
p {
    text-align: center;
    opacity: 0.8;
    margin-bottom: 20px;
}

/* КНОПКИ */
.btn {
    width: 100%;
    padding: 16px;
    margin: 10px 0;
    border-radius: 14px;
    border: none;
    font-size: 16px;
    font-weight: bold;
    text-decoration: none;
    color: white;
    display: block;
    text-align: center;
}

/* ЦВЕТА */
.android {
    background: linear-gradient(45deg, #22c55e, #16a34a);
}

.ios {
    background: linear-gradient(45deg, #ef4444, #dc2626);

.download {
    background: linear-gradient(45deg, #6366f1, #4f46e5);
}

.profile {
    background: linear-gradient(45deg, #0ea5e9, #0284c7);
}

/* НАЖАТИЕ */
.btn:active {

}
</style>
</head>
<body>

<div class="container">
