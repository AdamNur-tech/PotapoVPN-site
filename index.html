<!DOCTYPE html><html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPN Shop</title><style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

.container {
    margin-top: 50px;
}

button {
    padding: 15px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

.android { background: #22c55e; }
.ios { background: #3b82f6; }
.buy { background: #f59e0b; }

.box {
    background: #1e293b;
    padding: 20px;
    margin: 20px;
    border-radius: 15px;
}
</style></head>
<body><div class="container"><h1>Купить VPN</h1><div class="box">
<h2>Выбери устройство</h2>
<button class="android" onclick="selectDevice('android')">Android</button>
<button class="ios" onclick="selectDevice('ios')">iPhone</button>
</div><div class="box">
<h2>Тариф</h2>
<button class="buy" onclick="buyVPN()">Купить (тест)</button>
</div><div class="box" id="result" style="display:none">
<h2>Твоя ссылка</h2>
<p id="link"></p>
<button onclick="copyLink()">Скопировать</button>
</div></div><script>
let device = null;

let links = [
    {link: "vless://android1", device: "android", used: false},
    {link: "vless://android2", device: "android", used: false},
    {link: "vless://ios1", device: "ios", used: false},
    {link: "vless://ios2", device: "ios", used: false}
];

function selectDevice(d) {
    device = d;
    alert("Выбрано: " + d);
}

function buyVPN() {
    if (!device) {
        alert("Выбери устройство!");
        return;
    }

    let found = links.find(l => l.device === device && !l.used);

    if (!found) {
        alert("Нет доступных конфигов");
        return;
    }

    found.used = true;

    document.getElementById("result").style.display = "block";
    document.getElementById("link").innerText = found.link;
}

function copyLink() {
    let text = document.getElementById("link").innerText;
    navigator.clipboard.writeText(text);
    alert("Скопировано!");
}
</script></body>
</html>
