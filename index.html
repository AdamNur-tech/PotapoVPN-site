<!DOCTYPE html>
<html>
<head>
    <title>PotapoVPN</title>
    <meta charset="UTF-8">
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    font-family: Arial, sans-serif;
}

/* ФОН НА ВЕСЬ ЭКРАН */
body {
    background: linear-gradient(160deg, #0f172a, #1e3a8a, #312e81);
}

/* ОСНОВНОЙ БЛОК = ВЕСЬ ЭКРАН */
.box {
    width: 100%;
    height: 100vh;

    display: flex;
    flex-direction: column;
    justify-content: space-between; /* 🔥 растягивает по высоте */
    padding: 20px;
}

/* верх (заголовок) */
.top {
    text-align: center;
    color: white;
}

/* контейнер кнопок */
.buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* кнопки */
.btn {
    width: 100%;
    padding: 20px;
    border-radius: 16px;
    text-align: center;
    font-size: 17px;
    font-weight: bold;
    color: white;
    text-decoration: none;
}

/* ЦВЕТА */
.android {
    background: linear-gradient(45deg, #22c55e, #16a34a);
}

.ios {
    background: linear-gradient(45deg, #ef4444, #dc2626);
}

.download {
    background: linear-gradient(45deg, #6366f1, #4f46e5);
}

.profile {
    background: linear-gradient(45deg, #0ea5e9, #0284c7);
}

/* НАЖАТИЕ */
.btn:active {
    transform: scale(0.97);
}
</style>
</head>
<body>

<div class="box">

    <div class="top">
        <h1>🚀 PotapoVPN</h1>
        <p>🚀 Скорость • 🔒 Безопасность • 🌍 Обход</p>
    </div>

    <div class="buttons">

        <a href="/get-link?device=android" class="btn android">
            📱 Получить Android VPN
        </a>

        <a href="/get-link?device=ios" class="btn ios">
            🍎 Получить iOS VPN
        </a>

        <a href="/files/app.apk" class="btn download">
            ⬇ Скачать Android
        </a>

        <a href="/files/app.ipa" class="btn download">
            ⬇ Скачать iOS
        </a>

        <a href="/dashboard" class="btn profile">
            👤 Личный кабинет
        </a>

    </div>

</div>

</body>
</html>
