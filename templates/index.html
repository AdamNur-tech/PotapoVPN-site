<!DOCTYPE html>
<html>
<head>
    <title>PotapoVPN</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
            padding-top: 100px;
        }

        input {
            padding: 10px;
            margin: 5px;
            width: 200px;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            background: #6366f1;
            color: white;
            border: none;
            cursor: pointer;
        }

        .box {
            background: #1e293b;
            padding: 20px;
            display: inline-block;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>PotapoVPN</h2>

    <input id="username" placeholder="username"><br>
    <input id="password" type="password" placeholder="password"><br>

    <button onclick="register()">Регистрация</button>
    <button onclick="login()">Вход</button>

    <p id="result"></p>
</div>

<script>
function register() {
    fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        })
    })
    .then(r => r.json())
    .then(data => {
        document.getElementById('result').innerText = JSON.stringify(data)
    })
}

function login() {
    fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        })
    })
    .then(r => r.json())
    .then(data => {
        if (data.status === "ok") {
            localStorage.setItem("user_id", data.user_id)
            localStorage.setItem("role", data.role)

            window.location.href = "/dashboard"
        } else {
            document.getElementById('result').innerText = "Ошибка входа"
        }
    })
}
</script>

</body>
</html>
